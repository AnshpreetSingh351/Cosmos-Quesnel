    <style>
        .mdb {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pdf-icon {
            width: 50px;
            height: auto;
            object-fit: contain;
        }

        .fallback-text {
            margin-left: 6px;
            font-weight: 600;
            color: white;
        }

        .info-card {
            top: -100px;
            left: -50px;
            position: fixed;
            background-color: transparent;
            z-index: 8999;
            pointer-events: none;
            transform: scale(.9);
        }

        @media (max-width: 600px) {
            .Front {
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) scale(1.8);
            }

            .info-card,
            .info-content {

                left: -30px;

        body.splash-active {
            overflow: hidden;
            touch-action: none;
        }

        .call-btn {
            display: block;
            width: 100%;
            text-align: center;
            padding: 11px 1px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            background: #C9A87C;
            color: #111;
            border: 1px solid rgba(255, 255, 255, 0.12);

        .call-btn:hover {
            background: #0078be;
            color: #fff;

        .splash {
            position: fixed;
            inset: 0;
            z-index: 12000;
            display: grid;
            place-items: center;
            pointer-events: auto;
            opacity: 1;
            transition: opacity .6s ease;
        }

        .splash__backdrop {
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 10, .45);
            backdrop-filter: blur(14px);
        }

        .splash__content {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 0;
            background: transparent;
            border-radius: 0;
            box-shadow: none;
            transform: translateY(8px);
            animation: splash-pop .5s ease forwards;
            pointer-events: none;
        }

        .splash__logo {
            width: 300px;
            height: auto;
            object-fit: contain;
            filter: brightness(1.3) drop-shadow(0 4px 10px rgba(0, 0, 0, .15));
        }

        .splash__text {
            font: 600 18px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            color: #fff;
            letter-spacing: .2px;
            opacity: .95;
            text-shadow: 0 1px 2px rgba(0, 0, 0, .35);
        }

        @keyframes splash-pop {
            from {
                opacity: 0;
                transform: translateY(16px) scale(.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .splash.is-hidden {
            opacity: 0;
        }

        @media (prefers-reduced-motion: reduce) {
            .splash__content {
                animation: none;
                transform: none;
            }

            .splash {
                transition: opacity .2s linear;
            }

        .rera-blueprint {

        @media (max-width: 600px) {

        @media (max-width: 600px) {
            .top-header {

            .top-header a,

        @media (max-width: 600px) {

                top: 55%;

        .enquiry-btn {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10001;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            padding: 22px 11px;
            background: #0078be;
            color: #fff;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.7px;
            border: none;
            border-radius: 8px 0 0 8px;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: -4px 0 16px rgba(0, 0, 0, 0.22);
            transition: opacity 0.3s ease, background 0.2s ease, padding 0.2s ease;
        }

        .enquiry-btn.is-hidden {
            opacity: 0;
            pointer-events: none;
        }

        .enquiry-btn:hover {
            background: #b8936a;
            padding: 22px 14px;
        }

        @media (max-width: 600px) {
            .enquiry-btn {
                font-size: 11px;
                padding: 16px 9px;
            }
        }

        .enquiry .overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: stretch;
            justify-content: flex-end;
            background: rgba(0, 0, 0, 0);
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
            z-index: 99999;
            pointer-events: none;
            transition: background 0.35s ease, backdrop-filter 0.35s ease;
        }

        .enquiry .overlay.is-open {
            background: rgba(0, 0, 0, 0.52);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            pointer-events: auto;
        }

        .enquiry .modal {
            width: min(400px, 100vw);
            height: 100%;
            background: rgba(16, 17, 20, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0;
            box-shadow: -12px 0 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            transform: translateX(100%);
            transition: transform 0.38s cubic-bezier(0.32, 0.72, 0, 1);
        }

        .enquiry .overlay.is-open .modal {
            transform: translateX(0);
        }

        .enquiry .modal-header {
            padding: 20px 20px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .enquiry .modal-header::before {
            content: '';
            flex-shrink: 0;
            width: 3px;
            height: 22px;
            background: #C9A87C;
            border-radius: 2px;
        }

        .enquiry .modal-header .title {
            flex: 1;
            color: #fff;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 0.3px;
        }

        .enquiry .close {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            display: grid;
            place-items: center;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.06);
            color: #d7d7db;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.2s;
        }

        .enquiry .close:hover {
            background: rgba(255, 255, 255, 0.14);
        }

        .enquiry .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .enquiry .form {
            display: grid;
            gap: 12px;
            width: 100%;
            box-sizing: border-box;
        }

        .enquiry .input,
        .enquiry .select,
        .enquiry .phone {
            width: 100%;
            box-sizing: border-box;
            background: #e9eaed;
            border: 1px solid #cfd2d8;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
            color: #0f0f11;
        }

        .enquiry .input::placeholder {
            color: #b9bcc4;
        }

        .enquiry .select {
            appearance: none;
            cursor: pointer;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><path d="M7 10l5 5 5-5" fill="none" stroke="%23555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>');
            background-repeat: no-repeat;
            background-position: right 12px center;
        }

        .enquiry .phone {
            display: flex;
            padding: 0;
        }

        .enquiry .phone select {
            appearance: none;
            border: none;
            border-right: 1px solid #cfd2d8;
            padding: 0 10px;
            min-width: 72px;
            background: transparent;
            color: #3a3a3f;
            font-size: 14px;
        }

        .enquiry .phone input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px;
            font-size: 14px;
        }

        .enquiry .agree {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 12px;
            color: #a0a0a8;
        }

        .enquiry .agree a {
            color: #C9A87C;
            text-decoration: underline;
        }

        .enquiry .submit {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-weight: 700;
            font-size: 15px;
            background: #0078be;
            color: #111;
            cursor: pointer;
            margin-top: 4px;
            transition: background 0.2s ease;
        }

        .enquiry .submit:hover {
            background: #b8936a;
        }

        .submit[aria-busy="true"] {
            position: relative;
            pointer-events: none;
            opacity: .8;
        }

        .submit[aria-busy="true"]::after {
            content: "";
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid currentColor;
            border-right-color: transparent;
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: translateY(-50%) rotate(360deg);
            }
        }

        @media (max-width: 560px) {
            .enquiry .modal {
                width: 100vw;
            }
        }

        .enquiry .modal,
        .enquiry .form,
        .enquiry .input,
        .enquiry .select,
        .enquiry .phone,
        .enquiry .title,
        .enquiry .submit,
        .enquiry .agree {
            font-family: 'Poppins', sans-serif;
        }

        /* ═══════════════════════════════════════════════
           JUMPBAR — macOS Dock Style (ENHANCED VISIBILITY)
           ═══════════════════════════════════════════════ */
        .dock-wrap {
            position: fixed !important;
            bottom: 20px !important;
            left: 50% !important;
            translate: -50% 0;
            z-index: 11000 !important;
            display: flex !important;
            align-items: flex-end;
            visibility: visible !important;
            opacity: 1 !important;
            pointer-events: auto !important;
            animation: dock-bounce .7s cubic-bezier(.34, 1.56, .64, 1) both;
            animation-delay: .2s;
        }

        @keyframes dock-bounce {
            from {
                opacity: 0;
                translate: -50% 80px;
                scale: .8;
            }

            to {
                opacity: 1;
                translate: -50% 0;
                scale: 1;
            }
        }

        /* glass shelf — ENHANCED */
        .dock-shelf {
            position: absolute;
            bottom: 0;
            left: -18px;
            right: -18px;
            height: 94px;
            background: linear-gradient(135deg,
                    rgba(20, 22, 28, 0.88),
                    rgba(12, 14, 18, 0.92));
            border: 1.5px solid rgba(201, 168, 124, 0.25);
            border-radius: 24px;
            backdrop-filter: blur(32px) saturate(1.4);
            -webkit-backdrop-filter: blur(32px) saturate(1.4);
            box-shadow:
                0 8px 40px rgba(0, 0, 0, 0.6),
                0 2px 0 rgba(201, 168, 124, 0.08) inset,
                0 -1px 0 rgba(0, 0, 0, 0.3),
                0 0 60px rgba(201, 168, 124, 0.06);
            transition: height .35s cubic-bezier(.22, .68, 0, 1.04),
                border-radius .35s,
                left .35s, right .35s,
                box-shadow .35s;
            z-index: -1;
        }

        .dock-wrap:hover .dock-shelf {
            height: 112px;
            left: -24px;
            right: -24px;
            border-radius: 28px;
            border-color: rgba(201, 168, 124, 0.35);
            box-shadow:
                0 12px 50px rgba(0, 0, 0, 0.7),
                0 2px 0 rgba(201, 168, 124, 0.12) inset,
                0 0 80px rgba(201, 168, 124, 0.1);
        }

        .dock-items {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            padding: 0 14px 14px;
        }

        .dock-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            text-decoration: none;
            cursor: pointer;
            --size: 52px;
            width: var(--size);
            transition: width .25s cubic-bezier(.22, .68, 0, 1.04),
                margin .25s cubic-bezier(.22, .68, 0, 1.04);
            position: relative;
        }

        .dock-icon {
            width: var(--size);
            height: var(--size);
            border-radius: 16px;
            background: linear-gradient(145deg,
                    rgba(201, 168, 124, 0.12),
                    rgba(255, 255, 255, 0.04));
            border: 1.5px solid rgba(201, 168, 124, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: width .25s cubic-bezier(.22, .68, 0, 1.04),
                height .25s cubic-bezier(.22, .68, 0, 1.04),
                border-radius .25s,
                background .3s,
                border-color .3s,
                box-shadow .3s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3),
                0 0 20px rgba(201, 168, 124, 0.05);
        }

        .dock-icon svg {
            width: 22px;
            height: 22px;
            stroke: rgba(255, 255, 255, 0.75);
            transition: stroke .3s, width .25s, height .25s, filter .3s;
            flex-shrink: 0;
            filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.3));
        }

        /* reflection */
        .dock-icon::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, .1), transparent);
            border-radius: 16px 16px 0 0;
            pointer-events: none;
        }

        /* active dot — ENHANCED */
        .dock-dot {
            position: absolute;
            bottom: -4px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #c9a87c;
            opacity: 0;
            transition: opacity .3s;
            box-shadow: 0 0 8px rgba(201, 168, 124, 0.5);
        }

        .dock-item.is-accent .dock-dot {
            opacity: 1;
        }

        /* tooltip — ENHANCED */
        .dock-label {
            position: absolute;
            bottom: calc(100% + 14px);
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: #fff;
            white-space: nowrap;
            background: rgba(12, 12, 14, 0.95);
            border: 1px solid rgba(201, 168, 124, 0.3);
            padding: 8px 16px;
            border-radius: 10px;
            opacity: 0;
            scale: .9;
            translate: 0 6px;
            transition: opacity .2s, scale .2s, translate .2s;
            pointer-events: none;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        .dock-label::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            translate: -50% 0;
            border: 5px solid transparent;
            border-top-color: rgba(12, 12, 14, 0.95);
        }

        /* dock item text labels always visible */
        .dock-item-label {
            font-family: 'Outfit', sans-serif;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 6px;
            text-align: center;
            transition: color 0.3s;
        }

        .dock-item:hover .dock-item-label {
            color: #c9a87c;
        }

        /* divider — ENHANCED */
        .dock-divider {
            width: 1.5px;
            height: 36px;
            margin: 0 6px 14px;
            background: linear-gradient(180deg, transparent, rgba(201, 168, 124, 0.3), transparent);
            flex-shrink: 0;
            align-self: flex-end;
            transition: height .25s;
        }

        /* ripple */
        .dock-ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(201, 168, 124, .3);
            transform: scale(0);
            animation: dock-rip .5s ease-out forwards;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes dock-rip {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* bounce on click */
        @keyframes dock-click-bounce {
            0% {
                translate: 0 0;
            }

            30% {
                translate: 0 -16px;
            }

            50% {
                translate: 0 -4px;
            }

            70% {
                translate: 0 -8px;
            }

            100% {
                translate: 0 0;
            }
        }

        .dock-item.is-bouncing .dock-icon {
            animation: dock-click-bounce .45s cubic-bezier(.22, .68, 0, 1.04);
        }

        /* Subtle pulse glow on the shelf to draw attention */
        @keyframes dock-glow-pulse {

            0%,
            100% {
                box-shadow: 0 8px 40px rgba(0, 0, 0, .6), 0 0 40px rgba(201, 168, 124, .06);
            }

            50% {
                box-shadow: 0 8px 40px rgba(0, 0, 0, .6), 0 0 60px rgba(201, 168, 124, .15);
            }
        }

        .dock-shelf {
            animation: dock-glow-pulse 3s ease-in-out infinite;
            animation-delay: 2s;
        }

        .dock-wrap:hover .dock-shelf {
            animation: none;
        }

        @media (max-width: 520px) {
            .dock-wrap {
                bottom: 14px !important;
            }

            .dock-item {
                --size: 42px;
            }

            .dock-icon svg {
                width: 18px;
                height: 18px;
            }

            .dock-shelf {
                height: 82px;
                border-radius: 20px;
            }

            .dock-wrap:hover .dock-shelf {
                height: 98px;
            }

            .dock-item-label {
                font-size: 8px;
            }

            .dock-divider {
                height: 30px;
                margin-bottom: 14px;
            }
        }
    </style>

</head>

        (function () {
            const img = document.querySelector('.image-wrapper img');
            const layer = document.getElementById('hsLayer');
            if (!img || !layer) return;

            function doSync() {
                const r = img.getBoundingClientRect();
                layer.style.top = r.top + 'px';
                layer.style.left = r.left + 'px';
                layer.style.width = r.width + 'px';
                layer.style.height = r.height + 'px';
            }

            function syncAfterLayout() {
                requestAnimationFrame(() => requestAnimationFrame(doSync));
            }

            if (img.complete) syncAfterLayout();
            else img.addEventListener('load', syncAfterLayout, { once: true });
            window.addEventListener('load', syncAfterLayout, { once: true });
            window.addEventListener('resize', syncAfterLayout);
            window.addEventListener('orientationchange', () => {
                syncAfterLayout();
                setTimeout(syncAfterLayout, 250);
            });

            const mqPortrait = window.matchMedia('(max-aspect-ratio: 3840/5830)');
            const mqLandscape = window.matchMedia('(min-aspect-ratio: 3840/5830)');
            if (mqPortrait.addEventListener) {
                mqPortrait.addEventListener('change', syncAfterLayout);
                mqLandscape.addEventListener('change', syncAfterLayout);
            } else if (mqPortrait.addListener) {
                mqPortrait.addListener(syncAfterLayout);
                mqLandscape.addListener(syncAfterLayout);
            }

            if ('ResizeObserver' in window) {
                new ResizeObserver(syncAfterLayout).observe(img);
            }
        })();

    <script>
        (function () {
            const items = document.querySelectorAll('.dock-item');
            const dockItems = document.getElementById('dockItems');
            if (!dockItems || !items.length) return;

            const BASE = 52, MAX = 80, RANGE = 140;

            function magnify(e) {
                items.forEach(item => {
                    const icon = item.querySelector('.dock-icon');
                    const svg = item.querySelector('.dock-icon svg');
                    const label = item.querySelector('.dock-label');
                    const rect = item.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2;
                    const dist = Math.abs(e.clientX - cx);

                    if (dist < RANGE) {
                        const t = 1 - dist / RANGE;
                        const sz = BASE + (MAX - BASE) * t;
                        icon.style.width = sz + 'px';
                        icon.style.height = sz + 'px';
                        icon.style.borderRadius = (16 + t * 4) + 'px';
                        const iSz = 22 + t * 10;
                        svg.style.width = iSz + 'px';
                        svg.style.height = iSz + 'px';
                        item.style.width = sz + 'px';

                        if (t > .7) {
                            icon.style.background = 'linear-gradient(145deg, rgba(201,168,124,.2), rgba(201,168,124,.08))';
                            icon.style.borderColor = 'rgba(201,168,124,.4)';
                            icon.style.boxShadow = '0 4px 24px rgba(201,168,124,.2), 0 0 30px rgba(201,168,124,.1)';
                            svg.style.stroke = '#c9a87c';
                            svg.style.filter = 'drop-shadow(0 0 6px rgba(201,168,124,.4))';
                            label.style.opacity = '1';
                            label.style.scale = '1';
                            label.style.translate = '0 0';
                        } else {
                            resetIcon(icon, svg, label);
                        }
                    } else {
                        icon.style.width = BASE + 'px';
                        icon.style.height = BASE + 'px';
                        icon.style.borderRadius = '16px';
                        svg.style.width = '22px';
                        svg.style.height = '22px';
                        item.style.width = BASE + 'px';
                        resetIcon(icon, svg, label);
                    }
                });
            }

            function resetIcon(icon, svg, label) {
                icon.style.background = '';
                icon.style.borderColor = '';
                icon.style.boxShadow = '';
                svg.style.stroke = '';
                svg.style.filter = '';
                label.style.opacity = '0';
                label.style.scale = '.9';
                label.style.translate = '0 6px';
            }

            function resetAll() {
                items.forEach(item => {
                    const icon = item.querySelector('.dock-icon');
                    const svg = item.querySelector('.dock-icon svg');
                    const label = item.querySelector('.dock-label');
                    icon.style.width = icon.style.height = '';
                    icon.style.borderRadius = '';
                    svg.style.width = svg.style.height = '';
                    item.style.width = '';
                    resetIcon(icon, svg, label);
                });
            }

            dockItems.addEventListener('mousemove', magnify);
            dockItems.addEventListener('mouseleave', resetAll);

            // click bounce + ripple
            items.forEach(c => {
                c.addEventListener('click', e => {
                    // bounce
                    c.classList.add('is-bouncing');
                    c.addEventListener('animationend', () => c.classList.remove('is-bouncing'), { once: true });
                    // ripple
                    const r = document.createElement('span');
                    r.className = 'dock-ripple';
                    const icon = c.querySelector('.dock-icon');
                    const b = icon.getBoundingClientRect();
                    const s = Math.max(b.width, b.height);
                    r.style.width = r.style.height = s + 'px';
                    r.style.left = (e.clientX - b.left - s / 2) + 'px';
                    r.style.top = (e.clientY - b.top - s / 2) + 'px';
                    icon.appendChild(r);
                    r.addEventListener('animationend', () => r.remove());
                });
            });
        })();
    </script>
