    <script>
    function createArrowSVG() {
      const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <polygon points="50,20 75,65 50,55 25,65" fill="white"/>
  </svg>

  <script>
    // 1) Define both images
    const LOW_SRC = "./../../../images/Thumbnail/360/Parking_01.webp";
    const HIGH_SRC = "./../../../images/360/Parking_01.jpg";

    const imageContainer = document.querySelector(".image-container");

    // 2) Create panoramas
    const panoLow = new PANOLENS.ImagePanorama(LOW_SRC);
    const panoHigh = new PANOLENS.ImagePanorama(HIGH_SRC);

    // 3) Viewer
    const viewer = new PANOLENS.Viewer({
      container: imageContainer,
      autoRotate: false,
      autoRotateSpeed: 0.1,
      controlBar: false,
      cameraFov: 80
    });

    // after: const viewer = new PANOLENS.Viewer({...});
    let didInitView = false;

    // Keep the same initial yaw on both (texture yaw)
    const TEXTURE_YAW = -Math.PI / 2 + 0; // your existing value
    panoLow.rotation.y = TEXTURE_YAW;
    panoHigh.rotation.y = TEXTURE_YAW;

    // Desired tilt DOWN amount (pitch)
    const TILT_DOWN = Math.PI / 50; // ~16°

    function setInitialViewAndLockPitch() {
      if (didInitView) return;   // ✅ run only once (prevents flicker on swap)
      didInitView = true;

      const controls = viewer.getControl();

      // Positive value here, we pass -TILT to tilt DOWN
      const TILT = -Math.PI / 40;     // adjust how much you want to tilt
      controls.rotateUp(-TILT);      // tilt down

      // No vertical limits (free up/down)
      if ('minPolarAngle' in controls && 'maxPolarAngle' in controls) {
        controls.minPolarAngle = 0;          // can look straight up
        controls.maxPolarAngle = Math.PI;    // can look straight down
      }

      // Optional: rotation only (no panning)
      if ('enablePan' in controls) controls.enablePan = false;
    }


    // Apply same camera view when each pano becomes active
    panoLow.addEventListener('enter', setInitialViewAndLockPitch);
    panoHigh.addEventListener('enter', setInitialViewAndLockPitch);

    // Start with low; add both to viewer for smooth swap
    viewer.add(panoLow);
    viewer.add(panoHigh);
    viewer.setPanorama(panoLow);


    function degToRad(deg) {
      return deg * Math.PI / 180;
    }

    function setFromAngles(spot, yawDeg, pitchDeg, radius = 5000) {
      const yaw = degToRad(yawDeg);
      const pitch = degToRad(pitchDeg);

      const x = radius * Math.cos(pitch) * Math.sin(yaw);
      const y = radius * Math.sin(pitch);
      const z = radius * Math.cos(pitch) * Math.cos(yaw);

      spot.position.set(x, y, z);
    }











    // 🔴 Hotspot 1
       const ARROW_ICON = createArrowSVG();

    const spot1 = new PANOLENS.Infospot(350, ARROW_ICON);
    setFromAngles(spot1, 182, -10); 
    spot1.addHoverText("Parking 02");
    spot1.addEventListener('click', () => {
      // keep visible for a moment
      setTimeout(() => {
        window.location.href = "Parking_02.html";
      }, 800); // 0.8 sec delay
    });

    // ✅ Add all to panorama
    [panoLow, panoHigh].forEach(pano => {
      pano.add(spot1);
    });
    // Preload + swap high-res when ready
    panoLow.addEventListener("load", () => {
      panoHigh.addEventListener("load", () => {
        viewer.setPanorama(panoHigh, 600); // fade swap
        console.log("✅ Swapped to high-res panorama");
      });
      panoHigh.load();
    });

    panoHigh.addEventListener("error", (e) => {
      console.warn("⚠️ Failed to load high-res:", e);
    });
  </script>

    <script>
    (function(){
        const items=document.querySelectorAll('.dock-item'),dockItems=document.getElementById('dockItems');
        if(!dockItems||!items.length)return;
        const BASE=52,MAX=80,RANGE=140;
        function magnify(e){items.forEach(item=>{const icon=item.querySelector('.dock-icon'),svg=item.querySelector('.dock-icon svg'),label=item.querySelector('.dock-label'),rect=item.getBoundingClientRect(),cx=rect.left+rect.width/2,dist=Math.abs(e.clientX-cx);if(dist<RANGE){const t=1-dist/RANGE,sz=BASE+(MAX-BASE)*t;icon.style.width=sz+'px';icon.style.height=sz+'px';icon.style.borderRadius=(16+t*4)+'px';const iSz=22+t*10;svg.style.width=iSz+'px';svg.style.height=iSz+'px';item.style.width=sz+'px';if(t>.7){icon.style.background='linear-gradient(145deg,rgba(201,168,124,.2),rgba(201,168,124,.08))';icon.style.borderColor='rgba(201,168,124,.4)';icon.style.boxShadow='0 4px 24px rgba(201,168,124,.2)';svg.style.stroke='#c9a87c';svg.style.filter='drop-shadow(0 0 6px rgba(201,168,124,.4))';label.style.opacity='1';label.style.scale='1';label.style.translate='0 0';}else{reset(icon,svg,label);}}else{icon.style.width=BASE+'px';icon.style.height=BASE+'px';icon.style.borderRadius='16px';svg.style.width='22px';svg.style.height='22px';item.style.width=BASE+'px';reset(icon,svg,label);}});}
        function reset(icon,svg,label){icon.style.background='';icon.style.borderColor='';icon.style.boxShadow='';svg.style.stroke='';svg.style.filter='';label.style.opacity='0';label.style.scale='.9';label.style.translate='0 6px';}
        function resetAll(){items.forEach(item=>{const icon=item.querySelector('.dock-icon'),svg=item.querySelector('.dock-icon svg'),label=item.querySelector('.dock-label');icon.style.width=icon.style.height='';icon.style.borderRadius='';svg.style.width=svg.style.height='';item.style.width='';reset(icon,svg,label);});}
        dockItems.addEventListener('mousemove',magnify);dockItems.addEventListener('mouseleave',resetAll);
        items.forEach(c=>{c.addEventListener('click',e=>{c.classList.add('is-bouncing');c.addEventListener('animationend',()=>c.classList.remove('is-bouncing'),{once:true});const r=document.createElement('span');r.className='dock-ripple';const icon=c.querySelector('.dock-icon'),b=icon.getBoundingClientRect(),s=Math.max(b.width,b.height);r.style.width=r.style.height=s+'px';r.style.left=(e.clientX-b.left-s/2)+'px';r.style.top=(e.clientY-b.top-s/2)+'px';icon.appendChild(r);r.addEventListener('animationend',()=>r.remove());});});
    })();
    </script>
